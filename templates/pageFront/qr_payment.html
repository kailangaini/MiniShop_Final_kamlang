{% extends 'pageFront/master.html' %}

{% block content %}

<style>
/* KEEP YOUR ORIGINAL DESIGN */
.payment-page {
  background: #FAF8F3;
  min-height: 100vh;
  padding: 48px 20px 80px;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.checkout-card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 20px;
  border: 1px solid #E8E0D0;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  overflow: hidden;
}

.checkout-header {
  background: #FAF8F3;
  border-bottom: 1px solid #E8E0D0;
  padding: 28px 36px 24px;
  text-align: center;
}

.checkout-body {
  padding: 28px 36px 32px;
  text-align: center;
}

.qr-box img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}
</style>

<main class="payment-page">

  <div class="checkout-card">

    <div class="checkout-header">
      <h2>Scan & Pay</h2>
      <p>Use KHQR / Bakong app</p>
    </div>

    <div id="app" class="checkout-body">

      <div class="qr-box">
        <img src="{{ url_for('static', filename='qrcodes/' + filename) }}">
      </div>

      <div class="total-row">
        <span>Amount</span>
        <strong>${{ "%.2f"|format(cart_total) }}</strong>
      </div>

      <div class="instruction">

        <div v-if="!paid">
          <p>Waiting for payment...</p>
        </div>

        <div v-else style="color:green;">
          ✅ Payment confirmed
        </div>

      </div>

    </div>

  </div>

</main>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      qrcode: {{ qr|tojson }},
      paid: false,
      interval: null,
      stopped: false
    }
  },

  methods: {
    checkStatus() {

      if (this.stopped) return;

      axios.get('/check_status', {
        params: { qrcode: this.qrcode }
      }).then(res => {

        // always normalize result
        const statusRaw =
          res.data?.data?.status ||
          res.data?.status ||
          res.data;

        const status = String(statusRaw).trim().toUpperCase();

        console.log("STATUS:", status);

        if (status === "PAID" && !this.stopped) {

          this.paid = true;
          this.stopped = true;

          clearInterval(this.interval);
          this.interval = null;

          setTimeout(() => {
            window.location.replace("/confirmation_payment");
          }, 3000);
        }
      })
      .catch(err => {
        console.log("check error", err);
      });
    }
  },

  mounted() {
    this.checkStatus();
    this.interval = setInterval(this.checkStatus, 3000);
  },

  beforeUnmount() {
    clearInterval(this.interval);
  }
}).mount("#app");
</script>

{% endblock %}
