{% extends 'pageFront/master.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:    #FAF8F3;
    --warm:     #F2EDE3;
    --text:     #1A1710;
    --muted:    #8A8378;
    --border:   #E0D9CC;
    --orange:   #E8500A;
    --orange-h: #C94208;
    --orange-s: rgba(232,80,10,0.12);
  }

  .pd-page {
    background: var(--cream);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    padding: 36px 24px 60px;
  }

  /* BACK */
  .pd-back {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 32px;
  }

  /* CARD */
  .pd-card {
    max-width: 980px;
    margin: 0 auto;
    background: #fff;
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 560px;
  }

  /* LEFT */
  .pd-left {
    background: var(--warm);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .pd-img-wrap {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    min-height: 280px;
  }

  .pd-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .pd-desc {
    background: #fff;
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 18px 20px;
  }

  .pd-desc-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    margin-bottom: 7px;
  }

  .pd-desc-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* RIGHT */
  .pd-right {
    padding: 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .pd-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    margin-bottom: 18px;
  }

  .pd-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin-bottom: 6px;
  }

  .pd-tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .pd-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 26px;
  }

  .pd-price-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 30px;
  }

  .pd-price-num {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
  }

  /* QTY */
  .pd-qty-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .pd-qty-ctrl {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 50px;
    overflow: hidden;
  }

  .pd-qty-btn {
    width: 42px;
    height: 42px;
    border: none;
    background: transparent;
    cursor: pointer;
  }

  .pd-qty-num {
    width: 48px;
    text-align: center;
  }

  .pd-subtotal {
    font-size: 13px;
    color: var(--muted);
  }

  /* BUTTON */
  .pd-btn-cart {
    width: 100%;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 17px;
    cursor: pointer;
  }

  .pd-success {
    text-align: center;
    font-size: 13px;
    color: green;
    opacity: 0;
    transition: .3s;
    margin-top: 12px;
  }

  .pd-success.show {
    opacity: 1;
  }

  @media (max-width: 680px) {
    .pd-card { grid-template-columns: 1fr; }
  }
</style>

<div class="pd-page">

  <a href="{{ url_for('home') }}" class="pd-back">← Back</a>

  <div class="pd-card">

    <!-- LEFT -->
    <div class="pd-left">
      <div class="pd-img-wrap">
        <img src="{{ product.image }}">
      </div>

      <div class="pd-desc">
        <div class="pd-desc-name">{{ product.name }}</div>
        <div class="pd-desc-text">{{ product.description }}</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="pd-right">

      <span class="pd-badge">{{ product.category or 'Product' }}</span>

      <h1 class="pd-title">{{ product.name }}</h1>
      <p class="pd-tagline">Fresh & made to order</p>

      <div class="pd-divider"></div>

      <div class="pd-price-row">
        <span>$</span>
        <span class="pd-price-num">{{ product.price }}</span>
      </div>

      <div class="pd-qty-row">
        <div class="pd-qty-ctrl">
          <button class="pd-qty-btn" onclick="changeQty(-1)">-</button>
          <span class="pd-qty-num" id="qty-display">1</span>
          <button class="pd-qty-btn" onclick="changeQty(1)">+</button>
        </div>

        <span class="pd-subtotal">Total: <strong id="subtotal">${{ product.price }}</strong></span>
      </div>

      <button class="pd-btn-cart" id="cart-btn" onclick="addToCart()">
        Add to cart
      </button>

      <div class="pd-success" id="success-msg">
        Added to cart ✔
      </div>

    </div>

  </div>
</div>
<script>
let qty = 1;
let price = {{ product.price }};
let productId = {{ product.id }};

function changeQty(v){
  qty = Math.max(1, qty + v);
  document.getElementById("qty-display").innerText = qty;
  document.getElementById("subtotal").innerText = "$" + (qty * price).toFixed(2);
}

function addToCart(){

  fetch("/cart/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      product_id: productId,
      qty: qty
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {

      document.getElementById("success-msg").classList.add("show");

      setTimeout(() => {
        document.getElementById("success-msg").classList.remove("show");
      }, 1500);

    } else {
      alert("Failed to add to cart");
    }

  })
  .catch(() => {
    alert("Server error");
  });

}
</script>

{% endblock %}
